<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">A critical user journey needs objective checks, calibrated judgment, and held-out tasks</title>
  <desc id="desc">A critical user journey splits into deterministic checks and calibrated human judgment before a ship, improve, or hold decision. Private held-out tasks help protect the measurement by remaining outside the tuning loop.</desc>
  <style>
    :root { --bg: #faf9f6; --surface: #ffffff; --ink: #111827; --faint: #5f6875; --line: #d9dde5; --accent: #3b82f6; --accent-ink: #2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #030712; --surface: #111827; --ink: #f9fafb; --faint: #aeb7c4; --line: #334155; --accent: #60a5fa; --accent-ink: #93c5fd; } }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="var(--line)" stroke-width="1" opacity=".28"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="var(--accent)"/></marker>
  </defs>
  <rect width="1200" height="675" fill="var(--bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="8" fill="var(--accent)"/>
  <text x="70" y="84" class="mono" font-size="24" font-weight="700" letter-spacing="3" fill="var(--accent-ink)">EVAL CONTRACT</text>
  <text x="70" y="145" class="sans" font-size="42" font-weight="750" letter-spacing="-1" fill="var(--ink)">Start with what can be proven</text>

  <g aria-label="Critical user journey">
    <rect x="62" y="254" width="270" height="132" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="197" y="309" text-anchor="middle" class="sans" font-size="32" font-weight="720" fill="var(--ink)">Critical user</text>
    <text x="197" y="349" text-anchor="middle" class="sans" font-size="32" font-weight="720" fill="var(--ink)">journey</text>
  </g>
  <path d="M344 320H388V254H420" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M388 320V414H420" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>

  <g aria-label="Deterministic checks">
    <rect x="432" y="194" width="336" height="120" rx="18" fill="var(--surface)" stroke="var(--accent)" stroke-width="3"/>
    <text x="600" y="265" text-anchor="middle" class="sans" font-size="32" font-weight="730" fill="var(--ink)">Objective checks</text>
  </g>
  <g aria-label="Calibrated human judgment">
    <rect x="432" y="354" width="336" height="120" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="600" y="425" text-anchor="middle" class="sans" font-size="32" font-weight="730" fill="var(--ink)">Human judgment</text>
  </g>

  <path d="M780 254H816M780 414H816M816 254V414M816 334H846" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
  <g aria-label="Ship, improve, or hold decision">
    <rect x="858" y="264" width="276" height="140" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="996" y="345" text-anchor="middle" class="sans" font-size="36" font-weight="730" fill="var(--ink)">Decision</text>
  </g>

  <g aria-label="Private held-out tasks help protect measurement by remaining outside tuning">
    <rect x="62" y="532" width="1072" height="92" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2" stroke-dasharray="8 8"/>
    <text x="598" y="589" text-anchor="middle" class="sans" font-size="30" font-weight="700" fill="var(--accent-ink)">Held-out tasks stay outside tuning</text>
  </g>
</svg>
