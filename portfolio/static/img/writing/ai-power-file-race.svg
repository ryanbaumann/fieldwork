<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">A 400 watt power file did not win the race</title>
  <desc id="desc">A power file shows 400 watts for one hour beside a race result more than two minutes behind, illustrating that measurable output is not the outcome.</desc>
  <style>
    :root { --bg:#faf9f6; --surface:#fff; --ink:#111827; --faint:#5f6875; --line:#d9dde5; --accent:#3b82f6; --accent-ink:#2563eb; }
    @media (prefers-color-scheme:dark) { :root { --bg:#030712; --surface:#111827; --ink:#f9fafb; --faint:#aeb7c4; --line:#334155; --accent:#60a5fa; --accent-ink:#93c5fd; } }
    .sans { font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
    .mono { font-family:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace; }
  </style>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="var(--line)" stroke-width="1" opacity=".28"/></pattern>
    <marker id="tip" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 10 5 0 10Z" fill="var(--accent)"/></marker>
  </defs>
  <rect width="1200" height="675" fill="var(--bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="8" fill="var(--accent)"/>
  <rect x="1" y="1" width="1198" height="673" fill="none" stroke="var(--line)" stroke-width="2"/>
  <text x="70" y="82" class="mono" font-size="25" font-weight="700" letter-spacing="2.5" fill="var(--accent-ink)">STATE TT COURSE · 2009</text>
  <text x="70" y="145" class="sans" font-size="50" font-weight="750" letter-spacing="-1.4" fill="var(--ink)">The number was not the race</text>
  <g aria-label="Power file">
    <rect x="72" y="220" width="450" height="324" rx="24" fill="var(--ink)"/>
    <text x="112" y="276" class="mono" font-size="24" font-weight="700" letter-spacing="2" fill="var(--bg)" opacity=".72">POWER FILE</text>
    <text x="297" y="410" text-anchor="middle" class="sans" font-size="112" font-weight="800" letter-spacing="-4" fill="var(--bg)">400 W</text>
    <text x="297" y="475" text-anchor="middle" class="mono" font-size="30" fill="var(--bg)" opacity=".78">FOR ONE HOUR</text>
  </g>
  <path d="M550 382H648" fill="none" stroke="var(--accent)" stroke-width="5" marker-end="url(#tip)"/>
  <g aria-label="Race result">
    <rect x="676" y="220" width="452" height="324" rx="24" fill="var(--surface)" stroke="var(--line)" stroke-width="3"/>
    <text x="716" y="276" class="mono" font-size="24" font-weight="700" letter-spacing="2" fill="var(--faint)">RACE RESULT</text>
    <text x="902" y="410" text-anchor="middle" class="sans" font-size="108" font-weight="800" letter-spacing="-4" fill="var(--ink)">&gt;2:00</text>
    <text x="902" y="475" text-anchor="middle" class="mono" font-size="30" fill="var(--faint)">BEHIND</text>
  </g>
  <text x="600" y="628" text-anchor="middle" class="mono" font-size="27" fill="var(--faint)">output is measurable · the outcome is the point</text>
</svg>
