<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Own the stable layer while models and agent harnesses change</title>
  <desc id="desc">Changing model and harness layers surround a stable builder platform control plane for context, evals, distribution, and outcomes.</desc>
  <style>
    :root { --bg: #faf9f6; --surface: #ffffff; --ink: #111827; --faint: #5f6875; --line: #d9dde5; --accent: #3b82f6; --accent-ink: #2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #030712; --surface: #111827; --ink: #f9fafb; --faint: #aeb7c4; --line: #334155; --accent: #60a5fa; --accent-ink: #93c5fd; } }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="var(--line)" stroke-width="1" opacity=".28"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="var(--accent)"/></marker>
    <marker id="muted-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="var(--faint)"/></marker>
  </defs>
  <rect width="1200" height="675" fill="var(--bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="8" fill="var(--accent)"/>
  <text x="70" y="84" class="mono" font-size="19" font-weight="700" letter-spacing="3" fill="var(--accent-ink)">THE DURABLE DEVX LAYER</text>
  <text x="70" y="145" class="sans" font-size="42" font-weight="750" letter-spacing="-1" fill="var(--ink)">Own the loop, not the model</text>

  <g aria-label="Models change from current model to next model">
    <text x="70" y="208" class="mono" font-size="16" font-weight="700" letter-spacing="2" fill="var(--faint)">MODELS CHANGE</text>
    <rect x="270" y="176" width="190" height="48" rx="24" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="365" y="207" text-anchor="middle" class="sans" font-size="19" font-weight="650" fill="var(--faint)">Current model</text>
    <path d="M476 200H520" fill="none" stroke="var(--faint)" stroke-width="2.5" stroke-dasharray="5 6" marker-end="url(#muted-arrow)"/>
    <rect x="537" y="176" width="190" height="48" rx="24" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="632" y="207" text-anchor="middle" class="sans" font-size="19" font-weight="650" fill="var(--faint)">Next model</text>
  </g>

  <g aria-label="Stable builder platform control plane">
    <rect x="62" y="256" width="1076" height="244" rx="22" fill="var(--surface)" stroke="var(--accent)" stroke-width="3"/>
    <text x="92" y="294" class="mono" font-size="16" font-weight="700" letter-spacing="2" fill="var(--accent-ink)">PLATFORM CONTROL PLANE</text>
    <rect x="90" y="326" width="224" height="100" rx="16" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="202" y="384" text-anchor="middle" class="sans" font-size="28" font-weight="720" fill="var(--ink)">Context</text>
    <path d="M324 376H350" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="362" y="326" width="224" height="100" rx="16" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="474" y="386" text-anchor="middle" class="sans" font-size="34" font-weight="720" fill="var(--ink)">Evals</text>
    <path d="M596 376H622" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="634" y="326" width="224" height="100" rx="16" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="746" y="386" text-anchor="middle" class="sans" font-size="31" font-weight="720" fill="var(--ink)">Distribution</text>
    <path d="M868 376H894" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="906" y="326" width="204" height="100" rx="16" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="1008" y="386" text-anchor="middle" class="sans" font-size="31" font-weight="720" fill="var(--ink)">Outcomes</text>
  </g>

  <g aria-label="Agent harnesses change from current harness to next harness">
    <text x="70" y="574" class="mono" font-size="16" font-weight="700" letter-spacing="2" fill="var(--faint)">AGENT HARNESSES CHANGE</text>
    <rect x="390" y="541" width="190" height="48" rx="24" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="485" y="572" text-anchor="middle" class="sans" font-size="19" font-weight="650" fill="var(--faint)">Current harness</text>
    <path d="M596 565H640" fill="none" stroke="var(--faint)" stroke-width="2.5" stroke-dasharray="5 6" marker-end="url(#muted-arrow)"/>
    <rect x="657" y="541" width="190" height="48" rx="24" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
    <text x="752" y="572" text-anchor="middle" class="sans" font-size="19" font-weight="650" fill="var(--faint)">Next harness</text>
  </g>
  <text x="600" y="642" text-anchor="middle" class="mono" font-size="22" fill="var(--faint)">context · evals · distribution · outcomes</text>
</svg>
