  <path d="M 410 385 C 560 385, 590 453, 950 453" fill="none" stroke="var(--accent)" stroke-width="2.5" opacity="0.55" marker-end="url(#tip)"/>
  <path d="M 410 385 C 560 385, 590 539, 760 539" fill="none" stroke="var(--accent)" stroke-width="2.5" opacity="0.55" marker-end="url(#tip)"/>
  <path d="M 410 385 C 560 385, 590 539, 950 539" fill="none" stroke="var(--accent)" stroke-width="2.5" opacity="0.55" marker-end="url(#tip)"/>
  <rect x="110" y="288" width="260" height="194" rx="26" fill="var(--ink)"/>
  <text x="240" y="378" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="46" font-weight="750" fill="var(--bg)">DECIDE</text>
  <text x="240" y="420" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="23" fill="var(--bg)" opacity="0.82">the frontier tier</text>

