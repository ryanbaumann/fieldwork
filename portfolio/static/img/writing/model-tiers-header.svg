<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="One orchestrator node decides the design and fans bounded tasks out to a swarm of cheaper worker models that write the code.">
  <style>
    :root { --bg: #faf9f6; --surface: #ffffff; --ink: #111827; --faint: #5f6875; --line: #d9dde5; --accent: #3b82f6; --accent-ink: #2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #030712; --surface: #111827; --ink: #f9fafb; --faint: #aeb7c4; --line: #334155; --accent: #60a5fa; --accent-ink: #93c5fd; } }</style>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="var(--line)" stroke-width="1" opacity="0.28"/></pattern>
    <marker id="tip" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)"/></marker>
  </defs>
  <rect width="1200" height="675" fill="var(--bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="8" fill="var(--accent)"/>
  <rect x="1" y="1" width="1198" height="673" fill="none" stroke="var(--line)" stroke-width="2"/>
  
  <text x="70" y="86" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="28" font-weight="700" letter-spacing="2" fill="var(--accent-ink)">TIERED CODING AGENTS</text>
  <text x="70" y="152" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="750" letter-spacing="-1.5" fill="var(--ink)">One decides. Many build.</text>

  <text x="240" y="238" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="22" font-weight="700" letter-spacing="1.5" fill="var(--accent-ink)">1 ORCHESTRATOR · $$$</text>
  <path d="M 410 385 C 560 385, 590 281, 760 281" fill="none" stroke="var(--accent)" stroke-width="2.5" opacity="0.55" marker-end="url(#tip)"/>
  <path d="M 410 385 C 560 385, 590 281, 950 281" fill="none" stroke="var(--accent)" stroke-width="2.5" opacity="0.55" marker-end="url(#tip)"/>
