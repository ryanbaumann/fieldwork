  <rect x="960" y="422" width="160" height="62" rx="13" fill="var(--surface)" stroke="var(--accent)" stroke-width="2"/>
    <rect x="978" y="448" width="124" height="4" rx="2" fill="var(--accent)" opacity="0.55"/>
