<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Developer intent becomes grounded action: Intent, Current context, Workflow, Working code">
  <style>
    :root { --bg: #faf9f6; --surface: #ffffff; --ink: #111827; --faint: #5f6875; --line: #d9dde5; --accent: #3b82f6; --accent-ink: #2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #030712; --surface: #111827; --ink: #f9fafb; --faint: #aeb7c4; --line: #334155; --accent: #60a5fa; --accent-ink: #93c5fd; } }
  </style>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M 48 0 L 0 0 0 48" fill="none" stroke="var(--line)" stroke-width="1" opacity="0.28"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="var(--accent)"/></marker>
  </defs>
  <rect width="1200" height="675" fill="var(--bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="8" fill="var(--accent)"/>
  <text x="70" y="86" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="28" font-weight="700" letter-spacing="2" fill="var(--accent-ink)">PLATFORM INTERFACE</text>
  <text x="70" y="155" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="750" letter-spacing="-1" fill="var(--ink)">Developer intent becomes grounded action</text>
  <g>
      <rect x="100" y="235" width="460" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="124" cy="241" r="22" fill="var(--accent)"/>
      <text x="124" y="250" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="var(--surface)">1</text>
      <text x="330" y="315" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="700" fill="var(--ink)"><tspan x="330" dy="0">Intent</tspan></text>
      <path d="M 568 299 H 628" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    </g>
  <g>
      <rect x="640" y="235" width="460" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="664" cy="241" r="22" fill="var(--accent)"/>
      <text x="664" y="250" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="var(--surface)">2</text>
      <text x="870" y="315" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="700" fill="var(--ink)"><tspan x="870" dy="0">Current context</tspan></text>
      <path d="M 870 371 C 870 429, 330 364, 330 418" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    </g>
  <g>
      <rect x="100" y="430" width="460" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="124" cy="436" r="22" fill="var(--accent)"/>
      <text x="124" y="445" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="var(--surface)">3</text>
      <text x="330" y="510" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="700" fill="var(--ink)"><tspan x="330" dy="0">Workflow</tspan></text>
      <path d="M 568 494 H 628" fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)"/>
    </g>
  <g>
      <rect x="640" y="430" width="460" height="128" rx="18" fill="var(--surface)" stroke="var(--line)" stroke-width="2"/>
      <circle cx="664" cy="436" r="22" fill="var(--accent)"/>
      <text x="664" y="445" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="26" font-weight="700" fill="var(--surface)">4</text>
      <text x="870" y="510" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="40" font-weight="700" fill="var(--ink)"><tspan x="870" dy="0">Working code</tspan></text>
    </g>
  <text x="600" y="630" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="30" fill="var(--faint)">inside the agent session</text>
</svg>
