<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Usage closes the developer platform feedback loop</title>
  <desc id="desc">Inside a governed data boundary, portable context reaches developers through distribution. Activation, retention, and expansion outcomes are measured, traces are reviewed, and skills and evals improve.</desc>
  <style>
    :root { --bg: #faf9f6; --surface: #ffffff; --ink: #111827; --faint: #5f6875; --line: #d9dde5; --accent: #3b82f6; --accent-ink: #2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #030712; --surface: #111827; --ink: #f9fafb; --faint: #aeb7c4; --line: #334155; --accent: #60a5fa; --accent-ink: #93c5fd; } }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="var(--line)" stroke-width="1" opacity=".28"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="var(--accent)"/></marker>
  </defs>
  <rect width="1200" height="675" fill="var(--bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="8" fill="var(--accent)"/>
  <text x="70" y="84" class="mono" font-size="19" font-weight="700" letter-spacing="3" fill="var(--accent-ink)">DEVX GROWTH LOOP</text>
  <text x="70" y="145" class="sans" font-size="42" font-weight="750" letter-spacing="-1" fill="var(--ink)">Usage becomes evidence for improvement</text>

  <rect x="62" y="183" width="1076" height="420" rx="24" fill="var(--surface)" stroke="var(--line)" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="88" y="216" class="mono" font-size="15" font-weight="700" letter-spacing="1.8" fill="var(--faint)">GOVERNED BOUNDARY · PRIVACY · CONSENT · LICENSING</text>

  <g fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)">
    <path d="M342 298H426"/>
    <path d="M688 298H772"/>
    <path d="M903 358C903 426 819 472 722 472"/>
    <path d="M478 472H394"/>
    <path d="M265 420C265 376 241 366 227 354"/>
  </g>

  <g aria-label="Portable context">
    <rect x="92" y="244" width="250" height="108" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="217" y="289" text-anchor="middle" class="sans" font-size="28" font-weight="720" fill="var(--ink)">Portable</text>
    <text x="217" y="322" text-anchor="middle" class="sans" font-size="28" font-weight="720" fill="var(--ink)">context</text>
  </g>
  <g aria-label="Distribution into agent use">
    <rect x="438" y="244" width="250" height="108" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="563" y="290" text-anchor="middle" class="sans" font-size="31" font-weight="720" fill="var(--ink)">Distribution</text>
    <text x="563" y="322" text-anchor="middle" class="sans" font-size="20" fill="var(--faint)">agent use</text>
  </g>
  <g aria-label="Attributed activation, retention, and expansion outcomes">
    <rect x="784" y="244" width="262" height="108" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="915" y="286" text-anchor="middle" class="sans" font-size="29" font-weight="720" fill="var(--ink)">Outcomes</text>
    <text x="915" y="320" text-anchor="middle" class="sans" font-size="17" fill="var(--faint)">activate · retain · expand</text>
  </g>
  <g aria-label="Reviewed traces">
    <rect x="478" y="418" width="244" height="108" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="600" y="463" text-anchor="middle" class="sans" font-size="27" font-weight="720" fill="var(--ink)">Reviewed</text>
    <text x="600" y="496" text-anchor="middle" class="sans" font-size="27" font-weight="720" fill="var(--ink)">traces</text>
  </g>
  <g aria-label="Better skills and evals">
    <rect x="140" y="418" width="254" height="108" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="267" y="463" text-anchor="middle" class="sans" font-size="27" font-weight="720" fill="var(--ink)">Better skills</text>
    <text x="267" y="496" text-anchor="middle" class="sans" font-size="27" font-weight="720" fill="var(--ink)">and evals</text>
  </g>

  <text x="600" y="642" text-anchor="middle" class="mono" font-size="22" fill="var(--faint)">usage is a signal, not automatic training data</text>
</svg>
