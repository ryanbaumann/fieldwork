<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Usage closes the developer platform feedback loop</title>
  <desc id="desc">Inside a privacy-, consent-, and licensing-governed data boundary, portable context reaches developers through distribution. Activation, retention, and expansion outcomes are measured, traces are reviewed, and skills and evals improve.</desc>
  <style>
    :root { --bg: #faf9f6; --surface: #ffffff; --ink: #111827; --faint: #5f6875; --line: #d9dde5; --accent: #3b82f6; --accent-ink: #2563eb; }
    @media (prefers-color-scheme: dark) { :root { --bg: #030712; --surface: #111827; --ink: #f9fafb; --faint: #aeb7c4; --line: #334155; --accent: #60a5fa; --accent-ink: #93c5fd; } }
    .sans { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; }
  </style>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="var(--line)" stroke-width="1" opacity=".28"/></pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="var(--accent)"/></marker>
  </defs>
  <rect width="1200" height="675" fill="var(--bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="8" fill="var(--accent)"/>
  <text x="70" y="84" class="mono" font-size="24" font-weight="700" letter-spacing="3" fill="var(--accent-ink)">DEVX GROWTH LOOP</text>
  <text x="70" y="145" class="sans" font-size="42" font-weight="750" letter-spacing="-1" fill="var(--ink)">Usage becomes evidence for improvement</text>

  <rect x="62" y="183" width="1076" height="446" rx="24" fill="var(--surface)" stroke="var(--line)" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="88" y="224" class="mono" font-size="24" font-weight="700" letter-spacing="2" fill="var(--faint)">GOVERNED DATA BOUNDARY</text>

  <g fill="none" stroke="var(--accent)" stroke-width="4" marker-end="url(#arrow)">
    <path d="M352 320H428"/>
    <path d="M712 320H788"/>
    <path d="M930 390C930 456 826 502 722 502"/>
    <path d="M478 502H402"/>
    <path d="M266 442C266 408 244 394 224 388"/>
  </g>

  <g aria-label="Portable context">
    <rect x="88" y="258" width="264" height="124" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="220" y="311" text-anchor="middle" class="sans" font-size="34" font-weight="720" fill="var(--ink)">Portable</text>
    <text x="220" y="351" text-anchor="middle" class="sans" font-size="34" font-weight="720" fill="var(--ink)">context</text>
  </g>
  <g aria-label="Distribution into agent use">
    <rect x="440" y="258" width="272" height="124" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="576" y="331" text-anchor="middle" class="sans" font-size="36" font-weight="720" fill="var(--ink)">Distribution</text>
  </g>
  <g aria-label="Attributed activation, retention, and expansion outcomes">
    <rect x="800" y="246" width="284" height="144" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="942" y="292" text-anchor="middle" class="sans" font-size="34" font-weight="720" fill="var(--ink)">Outcomes</text>
    <text x="942" y="334" text-anchor="middle" class="sans" font-size="28" fill="var(--faint)">Activate · Retain</text>
    <text x="942" y="369" text-anchor="middle" class="sans" font-size="28" fill="var(--faint)">Expand</text>
  </g>
  <g aria-label="Reviewed traces">
    <rect x="478" y="442" width="244" height="120" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="600" y="493" text-anchor="middle" class="sans" font-size="32" font-weight="720" fill="var(--ink)">Review</text>
    <text x="600" y="531" text-anchor="middle" class="sans" font-size="32" font-weight="720" fill="var(--ink)">traces</text>
  </g>
  <g aria-label="Better skills and evals">
    <rect x="130" y="442" width="272" height="120" rx="17" fill="var(--bg)" stroke="var(--line)" stroke-width="2"/>
    <text x="266" y="493" text-anchor="middle" class="sans" font-size="32" font-weight="720" fill="var(--ink)">Improve skills</text>
    <text x="266" y="531" text-anchor="middle" class="sans" font-size="32" font-weight="720" fill="var(--ink)">and evals</text>
  </g>
</svg>
